name: Solar Assistant Scheduler

on:
  schedule:
    # Night mode: 01:00 Madrid = 23:00 UTC summer (CEST=UTC+2)
    - cron: '0 23 * * *'
    # Day mode: 07:00 Madrid = 05:00 UTC summer (CEST=UTC+2)
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode to apply (day / night / auto)'
        required: false
        default: 'auto'

jobs:
  apply-solar-mode:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium for Puppeteer
        run: npx puppeteer browsers install chrome

      - name: Determine mode
        id: mode
        run: |
          INPUT="${{ github.event.inputs.mode }}"
          if [ "$INPUT" = "day" ] || [ "$INPUT" = "night" ]; then
            echo "mode=$INPUT" >> $GITHUB_OUTPUT
          else
            HOUR=$(TZ='Europe/Madrid' date +%-H)
            echo "Madrid hour: $HOUR"
            if [ "$HOUR" -ge 1 ] && [ "$HOUR" -lt 7 ]; then
              echo "mode=night" >> $GITHUB_OUTPUT
            else
              echo "mode=day" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Apply solar mode
        env:
          SA_TOKEN: ${{ secrets.SA_TOKEN }}
        run: node apply-settings.js ${{ steps.mode.outputs.mode }}
